<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 230" fill="none">
  <!-- Left pizza peel -->
  <g transform="translate(150,85) rotate(-42)">
    <ellipse cx="0" cy="-50" rx="22" ry="7" fill="#111111"/>
    <rect x="-2" y="-43" width="4" height="60" fill="#111111" rx="2"/>
  </g>
  <!-- Right pizza peel -->
  <g transform="translate(150,85) rotate(42)">
    <ellipse cx="0" cy="-50" rx="22" ry="7" fill="#111111"/>
    <rect x="-2" y="-43" width="4" height="60" fill="#111111" rx="2"/>
  </g>
  <!-- Center: & symbol -->
  <text x="150" y="66" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#111111">&amp;</text>
  <!-- P and T -->
  <text x="128" y="84" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#111111">P</text>
  <text x="172" y="84" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#111111">T</text>

  <!-- Brand name -->
  <text x="150" y="150" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="bold" letter-spacing="1" fill="#111111">Pizza &amp; Totó</text>

  <!-- Underline -->
  <line x1="38" y1="161" x2="262" y2="161" stroke="#111111" stroke-width="1.8"/>

  <!-- Olive branch decoration -->
  <path d="M105,178 Q118,168 130,174 Q143,164 155,170 Q168,160 181,166 Q190,172 195,178" stroke="#111111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="118" cy="171" rx="5" ry="3" transform="rotate(-30,118,171)" fill="#111111" opacity="0.7"/>
  <ellipse cx="143" cy="167" rx="5" ry="3" transform="rotate(-20,143,167)" fill="#111111" opacity="0.7"/>
  <ellipse cx="168" cy="163" rx="5" ry="3" transform="rotate(-10,168,163)" fill="#111111" opacity="0.7"/>
</svg>
